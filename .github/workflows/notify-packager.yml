name: Notify repo-packager

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger repo-packager
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: Composable-Build/repo-packager
          event-type: component-released
          client-payload: >-
            {"repo":"${{ github.repository }}","tag":"${{ github.event.release.tag_name }}","sha":"${{ github.sha }}"}